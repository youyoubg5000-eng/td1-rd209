<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Instant Weather</h1>
        <p>Consulter la météo d'une commune</p>
    </header>

    <main>

        <section class="formulaire">

            <!-- Visible au démarrage -->
            <div id="zoneCodePostal">
                <label for="codePostal">Code postal :</label>
                <input type="text" id="codePostal" maxlength="5">

                <button id="btnCommunes">
                    Rechercher
                </button>
            </div>

            <!-- Caché au démarrage -->
            <div id="zoneCommune" style="display:none;">
                <label for="commune">
                    Choisissez une commune :
                </label>

                <select id="commune"></select>
            </div>

        </section>

        <section id="resultat"></section>

        <button id="btnReset" style="display:none;">
            Nouvelle recherche
        </button>

    </main>

    <script src="script.js"></script>

</body>
</html>
